# 角色列表与职责摘要、与阶段对应 — 供 Agent 解析
# phase_ids 为该角色参与的阶段 id，与 mapping 对应
# 产出归属：各阶段正式产出仅由 mapping/phase-role-skill.yaml 中规定的 role_id 负责，其他角色（含项目经理）不得代为撰写；测试计划/用例由 qa 负责等。见 .cyber_team/rules/role-boundary-and-intent-confirmation.md
roles:
  - id: project-manager
    name: 项目经理
    summary: 根据用户问题/需求按活动规范对项目活动裁剪，确定项目流程与计划
    phase_ids: [initiation]
  - id: product-requirements
    name: 产品经理
    summary: 需求分析、用户故事与验收标准、PRD、路线图/Backlog
    phase_ids: [requirements]
  - id: requirements-reviewer
    name: 需求评审专家
    summary: 审查需求/用户故事/PRD 的完整、一致、可测性
    phase_ids: [requirements-review]
  - id: architect
    name: 架构师
    summary: 架构设计、技术选型、ADR
    phase_ids: [design]
  - id: dba
    name: DBA
    summary: 数据模型、API 与数据库设计、迁移
    phase_ids: [design, development]
  - id: security
    name: 安全工程师
    summary: 安全设计与实现层检查
    phase_ids: [design, development, operations]
  - id: design-reviewer
    name: 设计评审专家
    summary: 审查架构与设计、技术选型、安全设计、DBA/DevOps 方案
    phase_ids: [design-review]
  - id: frontend
    name: 前端工程师
    summary: 前端实现、组件与页面、样式与构建
    phase_ids: [development]
  - id: backend
    name: 后端开发工程师
    summary: 后端与 API、业务逻辑、数据访问
    phase_ids: [development]
  - id: technical-writer
    name: 技术写作
    summary: 文档草稿、API 文档、发布说明
    phase_ids: [development]
  - id: code-reviewer
    name: 代码评审专家
    summary: 对 PR 做规范/安全/性能/可维护性评审
    phase_ids: [code-review]
  - id: qa
    name: 测试工程师
    summary: 测试策略、用例、执行、质量门禁
    phase_ids: [testing]
  - id: test-reviewer
    name: 测试评审专家
    summary: 审查测试计划/用例的覆盖度与可执行性
    phase_ids: [test-review]
  - id: devops
    name: 运维工程师
    summary: 流水线、环境、发布与回滚
    phase_ids: [deployment]
  - id: sre
    name: 可靠性工程师
    summary: 监控告警、故障复盘、安全与合规运维
    phase_ids: [operations]

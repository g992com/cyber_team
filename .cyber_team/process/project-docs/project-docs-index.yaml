# 项目文档索引 — 供多智能体发现各阶段产出物路径
# 使用方式：复制到业务项目 docs 目录（即 docs/project-docs-index.yaml），按实际产出填写/新增路径；Agent 先读此文件再按路径读取具体文档
# 路径均为相对于本文件所在目录的相对路径；不存在的路径表示该产出尚未创建

# 第一层 key 为阶段 id，与 process/phases.yaml 的 phases[].id 一致，便于 Agent 按 current_phase 查找
initiation:
  project_plan: initiation/project-plan.md
  process_tailoring: initiation/process-tailoring.md
  phase_activity_list: initiation/phase-activity-list.md
  charter_summary: initiation/charter-summary.md  # 可选

requirements:
  prd: requirements/prd.md
  user_stories: requirements/user-stories.md
  acceptance_criteria: requirements/acceptance-criteria.md
  backlog: requirements/backlog.md

requirements-review:
  review_record: review/requirements-review.md

design:
  architecture: design/architecture.md
  api_spec: design/api-spec.md
  database_design: design/database-design.md
  adr_dir: design/adr/

design-review:
  review_record: review/design-review.md

development:
  # 代码与迁移脚本在仓库常规目录（如 src/、migrations/），此处仅列文档类产出
  dev_guide: development/dev-guide.md  # 可选

code-review:
  review_record: review/code-review.md  # 或与 PR 绑定，此处为汇总/结论

testing:
  test_plan: testing/plan.md
  test_cases_dir: testing/cases/
  test_report: testing/report.md

test-review:
  review_record: review/test-review.md

deployment:
  release_notes: deployment/release-notes.md
  rollback_plan: deployment/rollback-plan.md
  deploy_guide: deployment/deploy-guide.md

operations:
  runbook_dir: operations/runbooks/
  postmortem_dir: operations/postmortems/
  slo_report: operations/slo-report.md
